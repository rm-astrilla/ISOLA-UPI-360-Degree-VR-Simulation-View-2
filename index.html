<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ISOLA-UPI 360 degree VR view</title>
    <meta name="description" content="Custom Stellarium Resources by Raihan Mohammad">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black">
      
      <a-assets>
        <img id="sky-upi" src="equirectangular_mw_orion.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#sky-upi" 
             rotation="45 180 0" 
             animation="property: rotation; to: 0 270 0; loop: true; dur: 100000; easing: linear">
      </a-sky>

      <a-entity camera look-controls rotation="90 45 45"></a-entity>
      

    </a-scene>

  </body>
</html>
